services:
  postgres:
    image: registry.cn-hangzhou.aliyuncs.com/library/postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aicourt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aicourt_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aicourt}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicourt"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: registry.cn-hangzhou.aliyuncs.com/library/redis:7-alpine
    command: redis-server --maxmemory 256mb --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
      - ./agents:/app/agents
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  orchestrator:
    build: ./backend
    command: python -m app.workers.orchestrator_worker
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./agents:/app/agents
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dispatcher:
    build: ./backend
    command: python -m app.workers.dispatch_worker
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./agents:/app/agents
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  outbox-relay:
    build: ./backend
    command: python -m app.workers.outbox_relay
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: registry.cn-hangzhou.aliyuncs.com/library/nginx:alpine
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
